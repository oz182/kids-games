<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Game Time! 🎮</title>
  <link rel="stylesheet" href="menu.css" />
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <main class="menu">
    <h1 class="title">
      <span class="title-wave">🎮</span> Game Time!
    </h1>

    <div class="grid">

      <a href="bubble.html" class="card" style="--c1:#3dd6f5;--c2:#1e90ff;">
        <div class="card-glow"></div>
        <div class="card-icon">🫧</div>
        <div class="card-label">Bubble Pop</div>
      </a>

      <a href="color.html" class="card" style="--c1:#f78ca0;--c2:#f9748f;">
        <div class="card-glow"></div>
        <div class="card-icon">🎨</div>
        <div class="card-label">Color Tap</div>
      </a>

      <a href="music.html" class="card" style="--c1:#a78bfa;--c2:#7c3aed;">
        <div class="card-glow"></div>
        <div class="card-icon">🎵</div>
        <div class="card-label">Music Time</div>
      </a>

      <a href="animals.html" class="card" style="--c1:#34d399;--c2:#059669;">
        <div class="card-glow"></div>
        <div class="card-icon">🐾</div>
        <div class="card-label">Animal Sounds</div>
      </a>

      <a href="balloons.html" class="card" style="--c1:#fbbf24;--c2:#f59e0b;">
        <div class="card-glow"></div>
        <div class="card-icon">🎈</div>
        <div class="card-label">Pop Balloons</div>
      </a>

      <a href="shape.html" class="card" style="--c1:#fb923c;--c2:#ea580c;">
        <div class="card-glow"></div>
        <div class="card-icon">🔷</div>
        <div class="card-label">Shape Match</div>
      </a>

      <a href="counting.html" class="card" style="--c1:#60a5fa;--c2:#2563eb;">
        <div class="card-glow"></div>
        <div class="card-icon">🔢</div>
        <div class="card-label">Counting Tap</div>
      </a>

      <a href="find.html" class="card" style="--c1:#f472b6;--c2:#db2777;">
        <div class="card-glow"></div>
        <div class="card-icon">🔍</div>
        <div class="card-label">Find &amp; Tap</div>
      </a>

      <a href="puzzle.html" class="card" style="--c1:#86efac;--c2:#16a34a;">
        <div class="card-glow"></div>
        <div class="card-icon">🧩</div>
        <div class="card-label">Puzzle Pieces</div>
      </a>

    </div>
  </main>

  <script src="menu.js"></script>
</body>
</html>
